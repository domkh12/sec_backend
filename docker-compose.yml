services:
  db:
    container_name: sec_db
    image: postgres:17.4-alpine
    restart: always
    env_file:
      - .env
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgresql_data:/var/lib/postgresql/data
    networks:
      - sec_net

volumes:
  postgresql_data:
    driver: local
networks:
  sec_net:
    driver: bridge