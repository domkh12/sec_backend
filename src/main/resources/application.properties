spring.application.name=secApi
server.port=16800
spring.profiles.active=dev

#config file size
logging.logback.rollingpolicy.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

#swagger config
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v1/api-docs
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.doc-expansion=none
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true

#bunny storage
bunny.storage-zone=sec-mega-storage
bunny.api-key=${BUNNY_API_KEY}
bunny.cdn-url=https://sec-pull-zone.b-cdn.net
bunny.region=

#cloudflare r2 bucket
cloudflare.r2.bucket=sec-storage-001
cloudflare.r2.public-url=https://cdn.sec-mega.site
cloudflare.r2.access-key=${CLOUDFLARE_R2_ACCESS_KEY}
cloudflare.r2.secret-key=${CLOUDFLARE_R2_SECRET_KEY}
cloudflare.r2.endpoint=https://3dc90edd93b0d5514c48f0ba9f794204.r2.cloudflarestorage.com